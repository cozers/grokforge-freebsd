name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: cd web && npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/out/

  build-freebsd-binary:
    name: Build freebsd/amd64
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/out/

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: freebsd
          GOARCH: amd64
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags "-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o grokforge-freebsd-amd64 ./cmd/grokforge

      - uses: actions/upload-artifact@v4
        with:
          name: grokforge-freebsd-amd64
          path: grokforge-freebsd-amd64

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-freebsd-binary
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract the section for this version from CHANGELOG.md
          # Format: ## vX.Y.Z\n\n...content...\n\n---
          python3 -c "
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          # Match the version section (## vX.Y.Z ... until next ## or ---)
          pattern = r'^## ' + re.escape('$VERSION') + r'\s*\n\n(.*?)(?=\n---|\n## |\Z)'
          m = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          if m:
              body = m.group(1).strip()
          else:
              body = 'Release $VERSION'
          # Write to GITHUB_OUTPUT (multiline)
          with open(sys.argv[1], 'a') as f:
              f.write('body<<EOF\n')
              f.write(body + '\n')
              f.write('EOF\n')
          " "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/grokforge-*
